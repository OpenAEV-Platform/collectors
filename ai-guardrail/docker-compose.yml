services:
  collector-ai-guardrail:
    image: openaev/collector-ai-guardrail:latest
    environment:
      - OPENAEV_URL=${OPENAEV_URL}
      - OPENAEV_TOKEN=${OPENAEV_TOKEN}
      - OPENAEV_TENANT_ID=${OPENAEV_TENANT_ID}
      - COLLECTOR_ID=${COLLECTOR_ID}
      - COLLECTOR_NAME=${COLLECTOR_NAME:-"AI Guardrail"}
      - COLLECTOR_PLATFORM=${COLLECTOR_PLATFORM:-LLM_FIREWALL}
      - COLLECTOR_LOG_LEVEL=${COLLECTOR_LOG_LEVEL:-warn}
      - COLLECTOR_PERIOD=${COLLECTOR_PERIOD:-PT60S}
      - COLLECTOR_PROVIDER=${COLLECTOR_PROVIDER:-generic}
      - COLLECTOR_EVENTS_URL=${COLLECTOR_EVENTS_URL}
      - COLLECTOR_API_KEY=${COLLECTOR_API_KEY:-}
      - COLLECTOR_LOOKBACK_MINUTES=${COLLECTOR_LOOKBACK_MINUTES:-60}
    restart: unless-stopped
