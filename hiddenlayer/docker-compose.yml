services:
  collector-hiddenlayer:
    image: openaev/collector-hiddenlayer:latest
    environment:
      - OPENAEV_URL=${OPENAEV_URL}
      - OPENAEV_TOKEN=${OPENAEV_TOKEN}
      - OPENAEV_TENANT_ID=${OPENAEV_TENANT_ID}
      - COLLECTOR_ID=${COLLECTOR_ID}
      - COLLECTOR_NAME=${COLLECTOR_NAME:-"HiddenLayer AIDR"}
      - COLLECTOR_PLATFORM=${COLLECTOR_PLATFORM:-LLM_FIREWALL}
      - COLLECTOR_LOG_LEVEL=${COLLECTOR_LOG_LEVEL:-warn}
      - COLLECTOR_PERIOD=${COLLECTOR_PERIOD:-PT120S}
      - COLLECTOR_BASE_URL=${COLLECTOR_BASE_URL:-https://api.us.hiddenlayer.ai}
      - COLLECTOR_AUTH_URL=${COLLECTOR_AUTH_URL:-https://auth.hiddenlayer.ai/oauth2/token}
      - COLLECTOR_CLIENT_ID=${COLLECTOR_CLIENT_ID:-}
      - COLLECTOR_CLIENT_SECRET=${COLLECTOR_CLIENT_SECRET:-}
    restart: unless-stopped
