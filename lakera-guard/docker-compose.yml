services:
  collector-lakera-guard:
    image: openaev/collector-lakera-guard:latest
    environment:
      - OPENAEV_URL=${OPENAEV_URL}
      - OPENAEV_TOKEN=${OPENAEV_TOKEN}
      - OPENAEV_TENANT_ID=${OPENAEV_TENANT_ID}
      - COLLECTOR_ID=${COLLECTOR_ID}
      - COLLECTOR_NAME=${COLLECTOR_NAME:-"Lakera Guard"}
      - COLLECTOR_PLATFORM=${COLLECTOR_PLATFORM:-LLM_FIREWALL}
      - COLLECTOR_LOG_LEVEL=${COLLECTOR_LOG_LEVEL:-warn}
      - COLLECTOR_PERIOD=${COLLECTOR_PERIOD:-PT120S}
      - COLLECTOR_BASE_URL=${COLLECTOR_BASE_URL:-https://api.lakera.ai/v2}
      - COLLECTOR_API_KEY=${COLLECTOR_API_KEY}
      - COLLECTOR_PROJECT_ID=${COLLECTOR_PROJECT_ID:-}
      - COLLECTOR_BLOCKING_POLICY=${COLLECTOR_BLOCKING_POLICY:-true}
    restart: unless-stopped
