version: 2.1
orbs:
  slack: circleci/slack@5.2.3
  kubernetes: circleci/kubernetes@1.3.1
jobs:
  build_docker_images:
    working_directory: ~/openaev
    docker:
      - image: cimg/base:stable-20.04
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Install environment
          command: |
            sudo apt-get update -qq
            sudo apt install curl gettext-base
            mkdir -p ~/openaev/images
      - run:
          working_directory: ~/openaev
          name: Replace pyoaev requirement of stable version with latest release branch code
          # We safely expand the CIRCLE_BRANCH variable because the CircleCI filters already enforce a strict release/x.x.x pattern using regex
          command: |
            if [ "${CIRCLE_BRANCH}" = "main" ]; then
              find . -name pyproject.toml | xargs -I ___ sed "s|branch = 'main'|branch = '${CIRCLE_BRANCH}'|" -i ___;
            fi;
      - run:
          working_directory: ~/openaev/mitre-attack
          name: Build Docker image openaev/collector-mitre-attack
          command: |
            if [[ "${CIRCLE_BRANCH}" == "main" ]]; then
              docker build --pull --progress=plain -t openaev/collector-mitre-attack:${CIRCLE_SHA1} --build-arg PYOAEV_GIT_BRANCH_OVERRIDE="${CIRCLE_BRANCH}" .
              docker build --pull --progress=plain -t openaev/collector-mitre-attack:${CIRCLE_SHA1}-ubi9 -f Dockerfile_ubi9 --build-arg PYOAEV_GIT_BRANCH_OVERRIDE="${CIRCLE_BRANCH}" .
            else 
              docker build --pull --progress=plain -t openaev/collector-mitre-attack:${CIRCLE_SHA1} .
              docker build --pull --progress=plain -t openaev/collector-mitre-attack:${CIRCLE_SHA1}-ubi9 -f Dockerfile_ubi9 .
            fi
            docker save -o ~/openaev/images/collector-mitre-attack openaev/collector-mitre-attack:${CIRCLE_SHA1}
            docker save -o ~/openaev/images/collector-mitre-attack-ubi9 openaev/collector-mitre-attack:${CIRCLE_SHA1}-ubi9
