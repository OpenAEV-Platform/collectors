name: Tests Collectors

on:
  push:
    branches:
      - main
    paths:
      - "*/test/**"
      - "*/tests/**"
      - "*/pyproject.toml"
      - "*/**/*.py"
      - "run_test.sh"
      - ".github/workflows/tests-collectors.yml"
      - ".github/scripts/**"
  pull_request:
    paths:
      - "*/test/**"
      - "*/tests/**"
      - "*/pyproject.toml"
      - "*/**/*.py"
      - "run_test.sh"
      - ".github/workflows/tests-collectors.yml"
      - ".github/scripts/**"

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-test-files:
    name: Detect test files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tests: ${{ steps.set-matrix.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-matrix
        name: Build test matrix
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_REF: main
        run: python .github/scripts/build_test_matrix.py

  test:
    name: Test ${{ matrix.name }}
    needs: detect-test-files
    if: needs.detect-test-files.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-test-files.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Clone pyoaev (satisfies Poetry path dependency)
        working-directory: ..
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            git clone -b main https://github.com/OpenAEV-Platform/client-python
          else
            git clone -b release/current https://github.com/OpenAEV-Platform/client-python
          fi

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Run tests via run_test.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          RELEASE_REF: main
        run: bash run_test.sh ${{ matrix.collector }}

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && hashFiles(format('{0}/coverage.xml', matrix.collector)) != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.collector }}
          fail_ci_if_error: false
          verbose: true
